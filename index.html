<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary meta ── -->
    <title>WellStreamer</title>
    <meta name="description" content="WellStreamer — Stream everything, ad-free." />
    <meta name="keywords" content="streaming, movies, series, anime, free" />
    <meta name="author" content="WellStreamer" />

    <!-- ── Theme ── -->
    <meta name="theme-color" content="#000000" />
    <meta name="msapplication-TileColor" content="#000000" />
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />

    <!-- ── PWA / Installable ── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── iOS PWA meta (critical for homescreen install on iOS) ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="WellStreamer" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />

    <!-- iOS splash screens -->
    <link rel="apple-touch-startup-image"
      href="/splash/splash-1125x2436.png"
      media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image"
      href="/splash/splash-1242x2688.png"
      media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" />
    <link rel="apple-touch-startup-image"
      href="/splash/splash-828x1792.png"
      media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72.png" />

    <!-- ── Open Graph ── -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="WellStreamer" />
    <meta property="og:description" content="Stream everything, ad-free." />
    <meta property="og:image" content="/icons/icon-512.png" />
    <meta property="og:url" content="https://well-streamer.vercel.app" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WellStreamer" />
    <meta name="twitter:description" content="Stream everything, ad-free." />
    <meta name="twitter:image" content="/icons/icon-512.png" />

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />

    <!-- ── Base styles ── -->
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
      body {
        background: #000;
        color: #f0f0f0;
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        min-height: 100vh;
        min-height: 100dvh; /* Dynamic viewport for mobile browsers */
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        /* Safe area for iOS notch */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
      #root { min-height: 100vh; min-height: 100dvh; }

      /* iOS tap highlight removal */
      * { -webkit-tap-highlight-color: transparent; }
      button { -webkit-appearance: none; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 3px; height: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(229,9,20,0.4); border-radius: 4px; }

      /* PWA splash screen background */
      .splash {
        position: fixed; inset: 0;
        background: #000;
        display: flex; align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .splash-logo {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 42px; letter-spacing: 3px;
      }
      .splash-logo span { color: #e50914; }
    </style>
  </head>
  <body>
    <!-- Splash screen shown before React loads -->
    <div class="splash" id="splash">
      <div class="splash-logo">WELL<span>STREAMER</span></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Hide splash when React is ready
      window.addEventListener('load', () => {
        const splash = document.getElementById('splash')
        if (splash) {
          setTimeout(() => {
            splash.style.opacity = '0'
            setTimeout(() => splash.remove(), 500)
          }, 800)
        }
      })
    </script>
  </body>
</html>
